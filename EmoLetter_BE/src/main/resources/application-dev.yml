spring:
  datasource:
    #mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DATABASE_HOST}:3306/${DATABASE_DB}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowMultiQueries=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000 #최적화 옵션

jwt:
  issuer: ${JWT_ISSUER}
  secret_key: ${JWT_SECRETKEY}
  expiration:
    access: 3600000 #1000 * 60 * 60 : 1시간
    refresh: 86400000 #1000 * 60 * 60 * 24 : 24시간
  redis:
    host: localhost
    port: 6379
