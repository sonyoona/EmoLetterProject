name: Deploy Spring Boot to EC2

on:
  push:
    branches: ["dev"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build in BE Folder
      - name: Build and Push BE Docker Image
        run: |
          cd be
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest

      # Copy docker-compose.yml to EC2
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "EmoLetter_BE/docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/app/docker-compose.yml"

      # Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔧 배포 시작"

            cd ~/app

            # 1. env 파일 생성
            echo "${{ secrets.SPRING_ENV_FILE }}" > .env

            # 2. 기존 컨테이너 종료
            sudo docker compose down || true

            # 3. 최신 이미지 가져오기
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest

            # 4. 오래된 이미지 정리
            sudo docker image prune -af

            # 5. docker compose 실행
            sudo docker compose up -d

            echo "🚀 배포 완료"
