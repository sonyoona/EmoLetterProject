name: Deploy Spring Boot to EC2

on:
  push:
    branches: ["dev"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Docker 로그인
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 이미지 빌드 & 푸시
      - name: Build and Push Docker Image
        run: |
          cd be
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest

      # EC2 서버에 SSH 접속하여 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "배포 시작"

            # 1) ENV 파일 적용
            echo "${{ secrets.SPRING_ENV_FILE }}" > ~/app/.env

            cd ~/app

            # 2) 기존 컨테이너 종료
            sudo docker compose down

            # 3) 최신 이미지 풀
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-be:latest

            # 4) 불필요한 이미지 삭제
            sudo docker image prune -af

            # 5) compose 실행
            sudo docker compose up -d

            echo "배포 완료"